<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Sun Tropez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #ea580c, #f97316);
      color: white; padding: 22px 28px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 16px rgba(234,88,12,0.25);
    }
    header h1 { font-size: 20px; font-weight: 800; }
    header p  { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .back-link {
      color: white; text-decoration: none; font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 8px;
      transition: background 0.15s;
    }
    .back-link:hover { background: rgba(255,255,255,0.32); }

    main { max-width: 860px; margin: 28px auto; padding: 0 16px 48px; }

    /* LOGIN */
    .login-card {
      background: white; border-radius: 20px; padding: 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 380px; margin: 60px auto;
    }
    .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .field-label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; color: #374151; }
    .field-input {
      width: 100%; padding: 13px 14px; border: 2px solid #e5e7eb;
      border-radius: 12px; font-size: 15px; font-family: 'Inter', sans-serif;
      outline: none; margin-bottom: 14px; transition: all 0.15s;
    }
    .field-input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
    #login-error { color: #ef4444; font-size: 13px; margin-top: 6px; min-height: 18px; }

    .btn-primary {
      width: 100%; padding: 13px; background: linear-gradient(135deg, #ea580c, #f97316);
      color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
      box-shadow: 0 3px 12px rgba(234,88,12,0.3);
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }

    /* STATS */
    .stats-row {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 20px;
    }
    .stat-box {
      background: white; border-radius: 16px; padding: 20px 16px; text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .stat-num   { font-size: 38px; font-weight: 800; color: #f97316; line-height: 1; }
    .stat-label { font-size: 12px; color: #9ca3af; margin-top: 5px; font-weight: 500; }

    /* MONTH SELECTOR */
    .month-bar {
      background: white; border-radius: 16px; padding: 16px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .month-nav-btn {
      background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 10px;
      padding: 8px 16px; cursor: pointer; font-size: 15px; font-weight: 700;
      color: #ea580c; transition: all 0.15s; font-family: 'Inter', sans-serif;
    }
    .month-nav-btn:hover { background: #ffedd5; transform: scale(1.05); }
    .month-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    #month-display {
      font-size: 17px; font-weight: 700; color: #1f2937; text-align: center; flex: 1;
      text-transform: capitalize;
    }

    /* BOOKING LIST */
    .bookings-card {
      background: white; border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden;
    }
    .bookings-card-header {
      padding: 18px 24px; border-bottom: 1px solid #f3f4f6;
      display: flex; align-items: center; gap: 10px;
    }
    .bookings-card-header h2 { font-size: 16px; font-weight: 700; }
    .count-pill {
      background: #fff7ed; color: #ea580c; font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }

    .booking-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; border-bottom: 1px solid #f9fafb;
      transition: background 0.12s;
    }
    .booking-item:last-child { border-bottom: none; }
    .booking-item:hover { background: #fffbf7; }

    .booking-date-col {
      min-width: 110px; text-align: center;
      background: #fff7ed; border-radius: 12px; padding: 10px 8px;
    }
    .booking-day   { font-size: 26px; font-weight: 800; color: #ea580c; line-height: 1; }
    .booking-month { font-size: 11px; font-weight: 600; color: #f97316; text-transform: uppercase; letter-spacing: 0.5px; }
    .booking-dow   { font-size: 11px; color: #9ca3af; margin-top: 2px; }

    .booking-info  { flex: 1; min-width: 0; }
    .booking-name  { font-size: 15px; font-weight: 700; color: #1f2937; }
    .booking-email { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .booking-meta  { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    .booking-time {
      background: #dbeafe; color: #2563eb; font-size: 13px; font-weight: 700;
      padding: 6px 12px; border-radius: 8px; white-space: nowrap;
    }
    .booking-time.past { background: #f3f4f6; color: #9ca3af; }

    .btn-cancel {
      background: white; color: #ef4444; border: 1.5px solid #fecaca;
      padding: 7px 13px; border-radius: 8px; font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-cancel:hover { background: #fef2f2; border-color: #ef4444; }

    .empty-state {
      padding: 48px 24px; text-align: center; color: #9ca3af; font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .stats-row { gap: 8px; }
      .stat-box { padding: 14px 8px; }
      .stat-num { font-size: 28px; }
      .booking-item { flex-wrap: wrap; gap: 10px; }
      .booking-date-col { min-width: 80px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏐 Admin — Sun Tropez</h1>
    <p>Gestionare rezervări</p>
  </div>
  <a href="/" class="back-link">← Site</a>
</header>

<!-- LOGIN -->
<div id="login-section">
  <div class="login-card">
    <h2>🔐 Autentificare</h2>
    <label class="field-label" for="token-input">Parolă admin</label>
    <input class="field-input" type="password" id="token-input" placeholder="Introdu parola..." />
    <button class="btn-primary" onclick="login()">Intră</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- ADMIN CONTENT -->
<main id="admin-section" class="hidden">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="stat-today">—</div>
      <div class="stat-label">Azi</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-week">—</div>
      <div class="stat-label">Săptămâna aceasta</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total rezervări</div>
    </div>
  </div>

  <!-- Month selector -->
  <div class="month-bar">
    <button class="month-nav-btn" id="btn-prev-month" onclick="changeMonth(-1)">‹</button>
    <div id="month-display"></div>
    <button class="month-nav-btn" id="btn-next-month" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Booking list -->
  <div class="bookings-card">
    <div class="bookings-card-header">
      <h2>Rezervări</h2>
      <span class="count-pill" id="count-label">0</span>
    </div>
    <div id="booking-list"></div>
  </div>

</main>

<script>
const MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
                   'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const DAYS_RO   = ['Dum','Lun','Mar','Mie','Joi','Vin','Sâm'];

let adminToken = '';
let viewYear   = new Date().getFullYear();
let viewMonth  = new Date().getMonth(); // 0-based

function login() {
  adminToken = document.getElementById('token-input').value.trim();
  loadAll();
}
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

function monthKey(y, m) {
  return `${y}-${String(m + 1).padStart(2, '0')}`;
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  updateMonthDisplay();
  loadBookings();
}

function updateMonthDisplay() {
  document.getElementById('month-display').textContent =
    `${MONTHS_RO[viewMonth]} ${viewYear}`;
  // Disable prev if too far back (e.g., more than 12 months ago)
  const now = new Date();
  const minYear = now.getFullYear() - 1;
  document.getElementById('btn-prev-month').disabled =
    (viewYear < minYear || (viewYear === minYear && viewMonth < now.getMonth()));
}

async function loadAll() {
  await Promise.all([loadBookings(), loadStats()]);
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats', {
      headers: { 'x-admin-token': adminToken }
    });
    if (!res.ok) return;
    const s = await res.json();
    document.getElementById('stat-today').textContent = s.today;
    document.getElementById('stat-week').textContent  = s.week;
    document.getElementById('stat-total').textContent = s.total;
  } catch {}
}

async function loadBookings() {
  try {
    const key = monthKey(viewYear, viewMonth);
    const res = await fetch(`/api/admin/bookings?month=${key}`, {
      headers: { 'x-admin-token': adminToken }
    });
    if (res.status === 401) {
      document.getElementById('login-error').textContent = 'Parolă incorectă.';
      return;
    }
    const bookings = await res.json();
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('admin-section').classList.remove('hidden');
    updateMonthDisplay();
    renderBookings(bookings);
  } catch {
    document.getElementById('login-error').textContent = 'Eroare de conexiune.';
  }
}

function renderBookings(bookings) {
  document.getElementById('count-label').textContent = bookings.length;
  const list = document.getElementById('booking-list');

  if (bookings.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        Nicio rezervare în ${MONTHS_RO[viewMonth]} ${viewYear}.
      </div>`;
    return;
  }

  const todayStr = new Date().toISOString().slice(0, 10);
  const pad = h => String(h).padStart(2, '0') + ':00';

  list.innerHTML = bookings.map(b => {
    const d = new Date(b.date + 'T12:00:00');
    const dayNum   = d.getDate();
    const monthStr = MONTHS_RO[d.getMonth()].slice(0, 3);
    const dowStr   = DAYS_RO[d.getDay()];
    const isFuture = b.date >= todayStr;
    const createdAt = new Date(b.created_at).toLocaleString('ro-RO', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
    });

    return `
      <div class="booking-item" id="item-${b.id}">
        <div class="booking-date-col">
          <div class="booking-day">${dayNum}</div>
          <div class="booking-month">${monthStr}</div>
          <div class="booking-dow">${dowStr}</div>
        </div>
        <div class="booking-info">
          <div class="booking-name">${b.prenume} ${b.nume}</div>
          <div class="booking-email">${b.email}</div>
          <div class="booking-meta">Înregistrat: ${createdAt}</div>
        </div>
        <div class="booking-time ${isFuture ? '' : 'past'}">${pad(b.slot_start)} – ${pad(b.slot_end)}</div>
        <button class="btn-cancel" onclick="cancelBooking(${b.id})">Anulează</button>
      </div>`;
  }).join('');
}

async function cancelBooking(id) {
  if (!confirm('Anulezi această rezervare?')) return;
  await fetch(`/api/admin/bookings/${id}`, {
    method: 'DELETE',
    headers: { 'x-admin-token': adminToken }
  });
  await loadAll();
}
</script>
</body>
</html>
